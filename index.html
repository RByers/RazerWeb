<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razer Web Configurator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <h1><span class="highlight">Razer</span> Web Config</h1>
            </div>
            <div class="header-controls">
                <label class="toggle-label" title="Show all controls, even for unsupported features">
                    <input type="checkbox" id="showAllToggle"> Show All
                </label>
                <button id="connectBtn" class="btn btn-primary">Connect Device</button>
            </div>
        </header>

        <main class="app-main">
            <!-- Sidebar for controls -->
            <aside class="controls-sidebar">
                <div class="card device-info">
                    <h2>Device Info</h2>
                    <p><strong>Name:</strong> <span id="deviceName">Not Connected</span></p>
                    <p><strong>Serial:</strong> <span id="deviceSerial">N/A</span></p>
                    <p><strong>Firmware:</strong> <span id="deviceFw">N/A</span></p>
                    <p><strong>Battery:</strong> <span id="deviceBattery">N/A</span></p>
                    <p><strong>Charging:</strong> <span id="deviceCharging">N/A</span></p>
                    <button id="refreshInfoBtn" class="btn btn-secondary" disabled>Refresh Info</button>
                </div>

                <div class="card led-control">
                    <h2>Lighting</h2>
                    <div class="form-group">
                        <label for="ledZone">LED Zone</label>
                        <select id="ledZone" disabled>
                            <option value="0">All / Default (0)</option>
                            <option value="1" selected>Scroll Wheel (1)</option>
                            <option value="4">Logo (4)</option>
                            <option value="5">Backlight (5)</option>
                        </select>
                    </div>

                    <hr class="divider">

                    <div class="form-group">
                        <label for="ledBrightness">Brightness</label>
                        <input type="range" id="ledBrightness" min="0" max="255" value="255" disabled>
                    </div>
                    <div class="button-group">
                        <button id="readBrightnessBtn" class="btn btn-secondary" disabled>Read</button>
                        <button id="applyBrightnessBtn" class="btn btn-primary" disabled>Apply</button>
                    </div>

                    <hr class="divider">

                    <div class="form-group">
                        <label for="ledEffect">Effect</label>
                        <select id="ledEffect" disabled>
                            <option value="none">None / Off</option>
                            <option value="static">Static</option>
                            <option value="wave">Wave</option>
                            <option value="spectrum">Spectrum</option>
                            <option value="breathing">Breathing</option>
                            <option value="reactive">Reactive</option>
                            <option value="starlight">Starlight</option>
                            <option value="wheel">Wheel</option>
                        </select>
                    </div>
                    <div id="breathingTypeContainer" class="form-group hidden">
                        <label for="breathingType">Breathing Type</label>
                        <select id="breathingType" disabled>
                            <option value="1">Single Color</option>
                            <option value="2">Dual Color</option>
                            <option value="3">Random</option>
                        </select>
                    </div>
                    <div id="colorContainer" class="form-group hidden">
                        <label for="ledColor">Color</label>
                        <input type="color" id="ledColor" value="#00FF00" disabled>
                    </div>
                    <div id="color2Container" class="form-group hidden">
                        <label for="ledColor2">Color 2</label>
                        <input type="color" id="ledColor2" value="#0000FF" disabled>
                    </div>
                    <div id="speedContainer" class="form-group hidden">
                        <label for="ledSpeed">Speed</label>
                        <input type="number" id="ledSpeed" min="1" max="255" value="40" disabled>
                    </div>
                    <div id="directionContainer" class="form-group hidden">
                        <label for="ledDirection">Direction</label>
                        <select id="ledDirection" disabled>
                            <option value="1">Forward (1)</option>
                            <option value="2">Backward (2)</option>
                        </select>
                    </div>
                    <div class="button-group">
                        <button id="readEffectBtn" class="btn btn-secondary" disabled>Read Effect</button>
                        <button id="applyEffectBtn" class="btn btn-primary" disabled>Apply Effect</button>
                    </div>
                </div>

                <div class="card dpi-control">
                    <h2>Performance</h2>
                    <div class="form-group">
                        <label for="pollRate">Polling Rate</label>
                        <select id="pollRate" disabled>
                            <option value="125">125 Hz</option>
                            <option value="500">500 Hz</option>
                            <option value="1000" selected>1000 Hz</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="dpiX">DPI X</label>
                        <input type="number" id="dpiX" min="100" max="30000" value="800" disabled>
                    </div>
                    <div class="form-group">
                        <label for="dpiY">DPI Y</label>
                        <input type="number" id="dpiY" min="100" max="30000" value="800" disabled>
                    </div>
                    <div class="button-group">
                        <button id="readPerfBtn" class="btn btn-secondary" disabled>Read</button>
                        <button id="applyPerfBtn" class="btn btn-primary" disabled>Apply</button>
                    </div>
                </div>

                <div class="card scroll-control">
                    <h2>Scroll Wheel</h2>
                    <div class="form-group">
                        <label for="scrollMode">Scroll Mode</label>
                        <select id="scrollMode" disabled>
                            <option value="0">Tactile</option>
                            <option value="1">Free Spin</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="scrollAccel">Scroll Acceleration</label>
                        <select id="scrollAccel" disabled>
                            <option value="0">Off</option>
                            <option value="1">On</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="smartReel">Smart Reel</label>
                        <select id="smartReel" disabled>
                            <option value="0">Off</option>
                            <option value="1">On</option>
                        </select>
                    </div>
                    <div class="button-group">
                        <button id="readScrollBtn" class="btn btn-secondary" disabled>Read</button>
                        <button id="applyScrollBtn" class="btn btn-primary" disabled>Apply</button>
                    </div>
                </div>

                <div class="card power-control">
                    <h2>Power Management</h2>
                    <div class="form-group">
                        <label for="idleTime">Idle Time (seconds)</label>
                        <input type="number" id="idleTime" min="60" max="900" value="300" disabled>
                    </div>
                    <div class="form-group">
                        <label for="lowBatteryThreshold">Low Battery Threshold</label>
                        <select id="lowBatteryThreshold" disabled>
                            <option value="12">5% (0x0C)</option>
                            <option value="38">15% (0x26)</option>
                            <option value="63">25% (0x3F)</option>
                        </select>
                    </div>
                    <div class="button-group">
                        <button id="readPowerBtn" class="btn btn-secondary" disabled>Read</button>
                        <button id="applyPowerBtn" class="btn btn-primary" disabled>Apply</button>
                    </div>
                </div>
            </aside>

            <!-- Main content for Debug / Log -->
            <section class="debug-section">
                <div class="card debug-card">
                    <div class="debug-header">
                        <h2>Protocol Debugger</h2>
                        <button id="clearLogBtn" class="btn btn-secondary btn-small">Clear Log</button>
                    </div>
                    <div id="debugLog" class="debug-log">
                        <!-- Log entries will appear here -->
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="protocol.js"></script>
    <script src="devices.js"></script>
    <script src="app.js"></script>
</body>
</html>
